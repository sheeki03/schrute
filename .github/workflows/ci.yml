name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: ${{ matrix.task.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: build
            command: npm run build
            needs_build: false
          - name: typecheck
            command: npx tsc --noEmit
            needs_build: false
          - name: unit
            command: npx vitest run tests/unit tests/fixtures/mock-sites
            needs_build: false
          - name: integration
            command: npx vitest run tests/integration
            needs_build: false
          - name: e2e
            command: npx vitest run tests/e2e
            needs_build: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Rust toolchain
        if: ${{ matrix.task.needs_build }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.85.0'
      - run: npm install
      - name: Build compiled entrypoints
        if: ${{ matrix.task.needs_build }}
        run: npm run build
      - name: Run ${{ matrix.task.name }}
        run: ${{ matrix.task.command }}

  native-build:
    name: native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.85.0'
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: npm install
      - name: Build native module
        run: npm run build:native
      - name: Upload native addon
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: native/index.node
          if-no-files-found: error
