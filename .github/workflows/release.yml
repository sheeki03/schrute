name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ─── npm publish ─────────────────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Docker → GitHub Container Registry ────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Standalone binaries → GitHub Releases ───────────────────────
  binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node22-linux-x64
            artifact: schrute-linux-x64
          - os: macos-latest
            target: node22-macos-arm64
            artifact: schrute-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Build standalone binary
        env:
          PKG_TARGET: ${{ matrix.target }}
        run: npx @yao-pkg/pkg dist/index.js --target "$PKG_TARGET" --output build/bin/schrute --config pkg.config.json
      - run: bash scripts/package-binary.sh
      - name: Create tarball
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: tar -czf "${ARTIFACT_NAME}.tar.gz" -C build/bin .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ─── Create GitHub Release with binaries ─────────────────────────
  release:
    needs: [npm, binary, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Homebrew tap update ─────────────────────────────────────────
  homebrew:
    needs: [npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sheeki03/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          SHA256=$(curl -sL "https://registry.npmjs.org/schrute/-/schrute-${VERSION}.tgz" | shasum -a 256 | cut -d' ' -f1)
          sed -i "s|url \".*\"|url \"https://registry.npmjs.org/schrute/-/schrute-${VERSION}.tgz\"|" Formula/schrute.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/schrute.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/schrute.rb
          git commit -m "schrute ${VERSION}"
          git push
