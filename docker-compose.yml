version: '3.8'
services:
  oneagent:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - ONEAGENT_AUTH_TOKEN=${ONEAGENT_AUTH_TOKEN:?ONEAGENT_AUTH_TOKEN is required}
      - ONEAGENT_NETWORK=true
      - ONEAGENT_HTTP_TRANSPORT=true
    volumes:
      - oneagent-data:/data

volumes:
  oneagent-data:
