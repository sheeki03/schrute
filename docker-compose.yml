version: '3.8'
services:
  schrute:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - SCHRUTE_AUTH_TOKEN=${SCHRUTE_AUTH_TOKEN:?SCHRUTE_AUTH_TOKEN is required}
      - SCHRUTE_NETWORK=true
      - SCHRUTE_HTTP_TRANSPORT=true
    volumes:
      - schrute-data:/data

volumes:
  schrute-data:
